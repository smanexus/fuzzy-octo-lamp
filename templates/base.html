<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1210">
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <title>{% block title %}Escala de Louvor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">♪</span>
        <span class="brand-text">Escala de Louvor</span>
      </a>
      {% block topbar_action %}{% endblock %}
    </header>

    <main class="content">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>2º Semestre 2026</span>
    </footer>
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("{{ url_for('service_worker') }}");
      });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
